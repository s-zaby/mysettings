# kitty built-in multiplexing
# Tabs, windows, and splits are built in; this config just adds handy defaults.

allow_remote_control yes
enabled_layouts splits,tall,fat,grid,stack

# ------------------------------------------------------------
# Catppuccin Mocha + p10k-ish appearance
# ------------------------------------------------------------

# Font
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        13.0

# Window
background_opacity 0.96
window_padding_width 10
confirm_os_window_close 0

# Catppuccin Mocha colors
foreground            #cdd6f4
background            #1e1e2e
selection_foreground  #cdd6f4
selection_background  #45475a
cursor                #f5e0dc
cursor_text_color     #1e1e2e

color0  #45475a
color1  #f38ba8
color2  #a6e3a1
color3  #f9e2af
color4  #89b4fa
color5  #f5c2e7
color6  #94e2d5
color7  #bac2de
color8  #585b70
color9  #f38ba8
color10 #a6e3a1
color11 #f9e2af
color12 #89b4fa
color13 #f5c2e7
color14 #94e2d5
color15 #a6adc8

# Tab bar
tab_bar_edge top
tab_bar_style slant
tab_bar_min_tabs 1
tab_bar_margin_width 0
tab_bar_margin_height 0 0
tab_separator ""
tab_fade 0.7

tab_bar_background #181825
active_tab_foreground #1e1e2e
active_tab_background #89b4fa
inactive_tab_foreground #cdd6f4
inactive_tab_background #313244
active_tab_font_style bold
inactive_tab_font_style normal
tab_title_template {fmt.fg.tab}{bell_symbol}{activity_symbol}{title}

# Borders
active_border_color  #89b4fa
inactive_border_color #313244
bell_border_color    #f38ba8

# History / scrollback
scrollback_lines 10000
wheel_scroll_multiplier 3.0

# Keybindings
map ctrl+shift+t new_tab
map ctrl+shift+enter launch --type=window
map ctrl+shift+alt+enter launch --type=tab
map ctrl+shift+l next_layout
map ctrl+shift+g goto_layout grid
map ctrl+shift+s launch --location=vsplit
map ctrl+shift+v launch --location=hsplit
map alt+1 goto_tab 1
map alt+2 goto_tab 2
map alt+3 goto_tab 3
map alt+4 goto_tab 4
map alt+5 goto_tab 5
map alt+6 goto_tab 6
map alt+7 goto_tab 7
map alt+8 goto_tab 8
map alt+9 goto_tab 9

# Optional clipboard helpers
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+insert paste_from_clipboard

# Shell integration
shell_integration enabled
